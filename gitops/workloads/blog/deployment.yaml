apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      containers:
        - name: blog
          image: duhyunkim-page:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: /data/blog.db # PVC 마운트 — 글이 재시작에도 영속
            - name: ADMIN_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: blog-admin
                  key: ADMIN_PASSWORD_HASH
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: blog-admin
                  key: AUTH_SECRET
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: blog-data
