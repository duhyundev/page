name: build-deploy

# Build the arm64 image, push to ghcr, then bump the Kustomize image tag so
# ArgoCD (pull-based) picks it up. Manifest-only commits are ignored to avoid
# the tag-bump commit re-triggering this workflow.
on:
  push:
    branches: [main]
    paths-ignore:
      - "gitops/**"
      - "docs/**"
      - "**.md"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-deploy:
    # Native arm64 runner (free for public repos) — no QEMU emulation, so the
    # arm64 build runs at native speed instead of being translated instruction
    # by instruction.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/duhyundev/page:${{ steps.meta.outputs.tag }}
            ghcr.io/duhyundev/page:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump Kustomize image tag
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_arm64.tar.gz" | tar xz
          cd gitops/workloads/blog
          ../../../kustomize edit set image duhyunkim-page=ghcr.io/duhyundev/page:${{ steps.meta.outputs.tag }}

      - name: Commit manifest bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/workloads/blog/kustomization.yaml
          git commit -m "deploy: blog ${{ steps.meta.outputs.tag }} [skip ci]" || echo "no change"
          git push
